<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubinger-AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-glow: 0 0 15px rgba(99, 102, 241, 0.6), 0 0 5px rgba(99, 102, 241, 0.8);
            --primary-glow-hover: 0 0 20px rgba(99, 102, 241, 0.8), 0 0 8px rgba(99, 102, 241, 1);
            
            --kids-bg-1: #fde68a;
            --kids-bg-2: #a7f3d0;
            --kids-bg-3: #fbcfe8;
            --kids-bg-4: #bae6fd;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #E0E6F1;
            background: linear-gradient(135deg, #0B0F19, #1e1b4b, #4c1d95, #0f766e);
            background-size: 400% 400%;
            animation: gradient-bg 25s ease infinite;
            overflow: hidden;
        }

        .kids-mode body {
            background: linear-gradient(135deg, var(--kids-bg-1), var(--kids-bg-2), var(--kids-bg-3), var(--kids-bg-4));
            background-size: 400% 400%;
            animation: gradient-bg-kids 20s ease infinite;
        }

        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes gradient-bg-kids {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.6), rgba(165, 180, 252, 0.5));
            border-radius: 3px; 
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.8), rgba(165, 180, 252, 0.7));
        }
        
        @keyframes highlight-pin {
          0% { box-shadow: 0 0 0 0 transparent; }
          50% { box-shadow: 0 0 12px 2px rgba(99, 102, 241, 0.4); }
          100% { box-shadow: 0 0 0 0 transparent; }
        }
        .animate-highlight-pin {
          animation: highlight-pin 1.2s ease-out;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); opacity: 0.1; }
            50% { opacity: 0.2; }
            100% { transform: translateX(100%); opacity: 0.1; }
        }
        .animate-shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, white, transparent);
            transform: translateX(-100%);
            animation: shimmer 1.5s infinite;
        }

        @keyframes fade-in-slide-up {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-slide-up {
            animation: fade-in-slide-up 0.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) forwards;
        }
        
        @keyframes typing-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .typing-indicator-bar {
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent);
            background-size: 200% 100%;
            animation: typing-shimmer 1.5s linear infinite;
        }
        
        .glass-pane {
            background: rgba(20, 25, 40, 0.55);
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .focus-glow {
            box-shadow: var(--primary-glow);
            border-color: rgba(99, 102, 241, 0.7) !important;
        }

        .header-button-glow:hover {
            box-shadow: var(--primary-glow);
        }

        @keyframes text-gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-text-gradient {
            background: linear-gradient(-45deg, #a5b4fc, #fbcfe8, #a7f3d0, #6366f1);
            background-size: 300% 300%;
            animation: text-gradient-animation 8s ease infinite;
        }
    </style>
    <script>
        // Verhindert FOUC (Flash of unstyled content) beim Laden des Themes
        // For this modern UI, dark mode is the default and only mode. Light mode is removed.
        document.documentElement.classList.add('dark');

        // FOUC Prevention for Kids Mode
        if (localStorage.getItem('bubinger-ai-kids-mode') === 'true') {
            document.documentElement.classList.add('kids-mode');
        }
    </script>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.1.0",
    "react/": "https://esm.sh/react@^19.1.1/",
    "react": "https://esm.sh/react@^19.1.1",
    "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
    "@google/genai": "https://esm.sh/@google/genai@^1.12.0",
    "react-markdown": "https://esm.sh/react-markdown@^9.0.1",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
